version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dependencymedic
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vuln_intelligence:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m services.vuln_intelligence.main
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      SERVICE_PORT: 8001
      SERVICE_NAME: vuln_intelligence
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  reachability_analysis:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m services.reachability_analysis.main
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      SERVICE_PORT: 8002
      SERVICE_NAME: reachability_analysis
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  remediation_engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m services.remediation_engine.main
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      SERVICE_PORT: 8003
      SERVICE_NAME: remediation_engine
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  gitlab_integration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m services.gitlab_integration.main
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      SERVICE_PORT: 8004
      SERVICE_NAME: gitlab_integration
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  api_gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m services.api_gateway.main
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SERVICE_PORT: 8000
      SERVICE_NAME: api_gateway
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api_gateway

volumes:
  mongo_data:
  redis_data:
